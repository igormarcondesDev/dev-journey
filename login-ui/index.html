<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login CodeNova</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- ESQUERDA -->
    <div class="login">

      <div class="logo">CodeNova</div>

      <h1>Entrar na sua conta</h1>
      <p class="subtitle">Bem-vindo de volta! Escolha uma forma de login:</p>

      <div class="social">
        <button class="social-btn">
          <img src="img/google-logo.png" alt="Google">
        </button>

        <button class="social-btn">
          <img src="img/facebook.png" alt="Facebook">
        </button>
      </div>

      <div class="divider">ou continue com e-mail</div>

      <form>

        <div class="input-group">
          <input type="email" placeholder="E-mail">
        </div>

        <div class="input-group password">
          <input type="password" id="password" placeholder="Senha">
          <span id="togglePassword">👁</span>
        </div>

        <div class="options">
          <label>
            <input type="checkbox" checked>
            Lembrar de mim
          </label>

          <a href="#">Esqueceu a senha?</a>
        </div>

        <button class="login-btn">Entrar</button>

      </form>

      <p class="signup">
        Não tem uma conta?
        <a href="#">Criar conta</a>
      </p>

    </div>

    <!-- DIREITA -->
    <div class="banner">
      <h2>Conecte-se com todas as aplicações</h2>
      <p>Tudo o que você precisa em um painel totalmente personalizável.</p>
    </div>

  </div>

</body>

</html>
